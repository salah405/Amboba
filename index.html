<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>غاز سريع - أمبوبا</title>

  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <meta name="theme-color" content="#667eea">
</head>

<body>

  <!-- 🔥 HEADER -->
  <header>
    <div style="font-size: 28px;">🛒 غاز سريع</div>
    <div style="font-size: 16px; opacity: 0.9;">اطلب أنبوبة في أقل من دقيقة ⏱️</div>
  </header>

  <!-- 🔐 LOGIN -->
  <div class="card" id="loginBox">
    <h3>🚀 ابدأ</h3>
    <button onclick="startApp()">ابدأ الطلب</button>
  </div>

  <!-- 👤 FORM -->
  <div id="appContent" style="display:none;">

    <div class="card">
      <h3>👤 بيانات العميل</h3>

      <input id="customerName" placeholder="الاسم الكامل *">
      <input id="customerPhone" placeholder="رقم الموبايل *" type="tel">
      <input id="customerAddress" placeholder="العنوان بالتفصيل *">
      <input id="customerArea" placeholder="المنطقة *">

      <button onclick="getCurrentLocation()" type="button">
        📍 تحديد موقعي
      </button>

      <div id="locationStatus" style="margin-top:10px; font-size:14px;">
        لم يتم تحديد الموقع بعد
      </div>

      <input id="customerLat" type="hidden">
      <input id="customerLng" type="hidden">
    </div>

    <!-- 💰 PRICES -->
    <div class="card price-card">
      <div>سعر الأنبوبة: <span id="gasPrice">100</span> جنيه</div>
      <div>سعر التوصيل: <span id="deliveryPrice">20</span> جنيه</div>

      <hr>

      <div class="total">
        الإجمالي: <span id="totalPrice">120</span> جنيه 💰
      </div>
    </div>

    <!-- 🚀 ORDER -->
    <button onclick="submitOrder()" class="main-btn">
      ✅ تأكيد الطلب
    </button>

  </div>

  <!-- 💬 MESSAGE -->
  <div id="message"></div>

  <!-- 🔥 MODULE SCRIPTS -->
  <script type="module">

    import { login, listenToAuth } from "./auth.js";

    // تشغيل التطبيق
    window.startApp = async function () {
      await login();
    };

    // متابعة حالة المستخدم
    listenToAuth((user) => {
      if (user) {
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("appContent").style.display = "block";
      }
    });

  </script>

  <!-- 🔥 APP LOGIC -->
  <script type="module" src="app.js"></script>

</body>
</html>
