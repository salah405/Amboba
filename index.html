<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>غاز سريع - أمبوبا</title>

  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <meta name="theme-color" content="#667eea">

  <style>
    .hidden { display:none; }
    .payment-box { margin-top:15px; }
    .instapay-box {
      background:#f0fdf4;
      padding:15px;
      border-radius:10px;
      margin-top:10px;
    }
  </style>
</head>

<body>

<!-- 🔥 HEADER -->
<header>
  <div style="font-size: 28px;">🛒 غاز سريع</div>
  <div style="font-size: 16px;">اطلب أنبوبة بسهولة ⏱️</div>
</header>

<!-- 🔐 LOGIN -->
<div class="card" id="loginBox">
  <h3>🚀 ابدأ</h3>
  <button onclick="startApp()">ابدأ الطلب</button>
</div>

<!-- 🧠 APP -->
<div id="appContent" style="display:none;">

  <!-- 👤 بيانات -->
  <div class="card">
    <h3>👤 بيانات العميل</h3>

    <input id="customerName" placeholder="الاسم الكامل *">
    <input id="customerPhone" placeholder="رقم الموبايل *" type="tel">
    <input id="customerAddress" placeholder="العنوان بالتفصيل *">
    <input id="customerArea" placeholder="المنطقة *">

    <button onclick="getCurrentLocation()">📍 تحديد موقعي</button>

    <div id="locationStatus">لم يتم تحديد الموقع</div>

    <input id="customerLat" type="hidden">
    <input id="customerLng" type="hidden">
  </div>

  <!-- 💰 الأسعار -->
  <div class="card price-card">
    <div>سعر الأنبوبة: <span id="gasPrice">100</span> جنيه</div>
    <div>سعر التوصيل: <span id="deliveryPrice">20</span> جنيه</div>
    <hr>
    <div class="total">الإجمالي: <span id="totalPrice">120</span> جنيه 💰</div>
  </div>

  <!-- 💳 الدفع -->
  <div class="card payment-box">
    <h3>💳 طريقة الدفع</h3>

    <select id="paymentMethod" onchange="handlePaymentChange()">
      <option value="cash">💵 الدفع عند الاستلام</option>
      <option value="instapay">📱 الدفع عبر إنستاباي</option>
    </select>

    <!-- Instapay -->
    <div id="instapayBox" class="instapay-box hidden">
      <p>قم بالتحويل إلى:</p>
      <strong id="instapayNumber">جارٍ التحميل...</strong>

      <p style="margin-top:10px;">📌 بعد التحويل اضغط تأكيد الطلب</p>
    </div>
  </div>

  <!-- 🚀 زرار -->
  <button onclick="submitOrder()" class="main-btn">
    ✅ تأكيد الطلب
  </button>

</div>

<!-- 💬 رسالة -->
<div id="message"></div>

<!-- 🔐 AUTH -->
<script type="module">
  import { login, listenToAuth } from "./auth.js";
  import { getInstapayInfo } from "./firebase.js";

  window.startApp = async function () {
    await login();
  };

  listenToAuth(async (user) => {
    if (user) {
      document.getElementById("loginBox").style.display = "none";
      document.getElementById("appContent").style.display = "block";

      // 🔥 تحميل بيانات إنستاباي
      const data = await getInstapayInfo();
      if (data) {
        document.getElementById("instapayNumber").innerText = data.number || "غير متاح";
      }
    }
  });

  // 💳 تغيير الدفع
  window.handlePaymentChange = function () {
    const method = document.getElementById("paymentMethod").value;

    document.getElementById("instapayBox").classList.toggle(
      "hidden",
      method !== "instapay"
    );
  };
</script>

<!-- 🔥 APP -->
<script type="module" src="app.js"></script>

</body>
</html>
