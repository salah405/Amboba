<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة التحكم</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<h2>⚙️ لوحة التحكم</h2>

<!-- 💰 الأسعار -->
<div class="card">
  <h3>💰 الأسعار</h3>

  <input id="gasPrice" placeholder="سعر الأنبوبة">
  <input id="deliveryPrice" placeholder="سعر التوصيل">

  <button onclick="savePrices()">💾 حفظ</button>
</div>

<!-- 💳 إنستاباي -->
<div class="card">
  <h3>💳 إنستاباي</h3>

  <input id="instaNumber" placeholder="رقم / لينك إنستاباي">

  <button onclick="saveInstapay()">💾 حفظ</button>
</div>

<!-- 🛵 المندوبين -->
<div class="card">
  <h3>🛵 المندوبين</h3>

  <input id="dName" placeholder="اسم المندوب">
  <input id="dPhone" placeholder="رقم الموبايل">
  <input id="dArea" placeholder="المنطقة">

  <button onclick="addDriver()">➕ إضافة</button>

  <div id="drivers"></div>
</div>

<!-- 📦 الطلبات -->
<div class="card">
  <h3>📦 الطلبات</h3>

  <div id="orders"></div>
</div>

<!-- 📤 تصدير -->
<button onclick="exportData()">📤 تحميل الطلبات</button>

<script type="module" src="admin.js"></script>

</body>
</html>
